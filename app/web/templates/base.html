<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Telemetry Platform{% endblock %} &#8212; TDP</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <!-- App CSS -->
  <link href="/static/css/app.css" rel="stylesheet" />

  {% block head %}{% endblock %}
</head>
<body>

  <!-- &#9472;&#9472; Top Header &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472; -->
  <header class="tdp-header">
    <div class="tdp-header-inner">

      <a href="/" class="tdp-brand">
        <span class="tdp-brand-mark">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="28" height="28" rx="4" fill="#EB0A1E"/>
            <path d="M6 14 L14 6 L22 14 L14 22 Z" fill="none" stroke="white" stroke-width="2"/>
            <circle cx="14" cy="14" r="3" fill="white"/>
          </svg>
        </span>
        <span class="tdp-brand-text">
          <span class="tdp-brand-title">TELEMETRY</span>
          <span class="tdp-brand-sub">DATA PLATFORM</span>
        </span>
      </a>

      <nav class="tdp-nav">
        <a href="/" class="tdp-nav-link {% if request.url.path == '/' %}active{% endif %}">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>
        <a href="/telemetry-ui" class="tdp-nav-link {% if request.url.path == '/telemetry-ui' %}active{% endif %}">
          <i class="bi bi-broadcast"></i>
          <span>Ingest Event</span>
        </a>
        <a href="/docs" class="tdp-nav-link" target="_blank">
          <i class="bi bi-code-square"></i>
          <span>API Docs</span>
        </a>
      </nav>

      <div class="tdp-header-right">
        <div class="tdp-status-pill">
          <span class="tdp-status-dot"></span>
          <span class="tdp-status-text">LIVE</span>
        </div>
        <div class="tdp-env-badge">{{ request.headers.get('host', 'localhost') }}</div>
      </div>

    </div>
  </header>

  <!-- &#9472;&#9472; Page Wrapper &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472; -->
  <div class="tdp-page">

    <!-- Page Header -->
    {% block page_header %}{% endblock %}

    <!-- Main Content -->
    <main class="tdp-main">
      {% block content %}{% endblock %}
    </main>

  </div>

  <!-- &#9472;&#9472; Footer &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472; -->
  <footer class="tdp-footer">
    <div class="tdp-footer-inner">
      <span class="tdp-footer-label">TDP v3.0.0</span>
      <span class="tdp-footer-sep">&middot;</span>
      <span class="tdp-footer-label">FastAPI &middot; PostgreSQL &middot; Redis</span>
      <span class="tdp-footer-sep">&middot;</span>
      <span class="tdp-footer-label" id="footer-clock"></span>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- Footer clock -->
  <script>
    (function() {
      const el = document.getElementById('footer-clock');
      function tick() {
        el.textContent = new Date().toUTCString().replace(' GMT', ' UTC');
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
